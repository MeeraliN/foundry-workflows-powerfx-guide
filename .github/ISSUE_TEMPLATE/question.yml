name: Question
description: Ask a Foundry workflows Power Fx question
title: "[Question]: "
body:
  - type: markdown
    attributes:
      value: |
        Submit your workflow Power Fx question here.
        
        New questions receive an automatic first reply with likely guidance and links to the matching learning-path section.

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the workflow step, field, or node you are working on.
      placeholder: I am trying to send a variable into an agent input field...
    validations:
      required: true

  - type: textarea
    id: expression
    attributes:
      label: What formula or value did you try?
      description: Paste the formula, field value, or workflow expression.
      placeholder: Local.PromptText
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: What error or behavior did you see?
      description: Paste the exact error if possible.
      placeholder: Type mismatch, Name isn't valid, loop failed...
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Which topic fits best?
      options:
        - Variables and scope
        - Message collections and UserMessage
        - Conditions and branching
        - Structured output and JSON
        - Tables and loops
        - Troubleshooting
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected the agent to receive the user message and continue.
